<div class="auth-container">
  <div class="glass-card auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your employee portal</p>
    </div>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" class="form-control" name="username" [(ngModel)]="form.username" required #username="ngModel" placeholder="Enter your username"/>
        <div class="error-msg" *ngIf="username.errors && f.submitted">
          Username is required!
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel" placeholder="Enter your password"/>
        <div class="error-msg" *ngIf="password.errors && f.submitted">
          <span *ngIf="password.errors['required']">Password is required!</span>
          <span *ngIf="password.errors['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <div class="form-group">
        <button class="btn-primary" [disabled]="isLoading">
          <span *ngIf="isLoading" class="spinner"></span>
          <span *ngIf="!isLoading">Sign In</span>
        </button>
      </div>

      <div class="form-group" *ngIf="isLoginFailed">
        <div class="error-alert">{{ errorMessage }}</div>
      </div>
    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a href="/register">Register here</a></p>
    </div>
  </div>
</div>
