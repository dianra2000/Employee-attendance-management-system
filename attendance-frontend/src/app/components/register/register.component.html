<div class="auth-container">
  <div class="glass-card auth-card" style="max-width: 500px;">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Register as a new employee</p>
    </div>

    <form *ngIf="!isSuccessful" (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" class="form-control" name="username" [(ngModel)]="form.username" required minlength="3" maxlength="20" #username="ngModel" />
        <div class="error-msg" *ngIf="username.errors && f.submitted">
          Username must be between 3 and 20 characters.
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" class="form-control" name="email" [(ngModel)]="form.email" required email #email="ngModel" />
        <div class="error-msg" *ngIf="email.errors && f.submitted">
          Valid email is required.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel" />
        <div class="error-msg" *ngIf="password.errors && f.submitted">
          Password must be at least 6 characters.
        </div>
      </div>

      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" class="form-control" name="fullName" [(ngModel)]="form.fullName" required #fullName="ngModel" />
      </div>

      <div style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label for="employeeId">Employee ID</label>
          <input type="text" class="form-control" name="employeeId" [(ngModel)]="form.employeeId" required #employeeId="ngModel" />
        </div>
        
        <div class="form-group" style="flex: 1;">
          <label for="department">Department</label>
          <input type="text" class="form-control" name="department" [(ngModel)]="form.department" required #department="ngModel" />
        </div>
      </div>

      <div class="form-group">
        <button class="btn-primary" [disabled]="isLoading">
          <span *ngIf="isLoading" class="spinner"></span>
          <span *ngIf="!isLoading">Sign Up</span>
        </button>
      </div>

      <div class="form-group" *ngIf="isSignUpFailed">
        <div class="error-alert">{{ errorMessage }}</div>
      </div>
    </form>

    <div class="success-alert" *ngIf="isSuccessful">
      Your registration is successful! Redirecting to login...
    </div>
    
    <div class="auth-footer" *ngIf="!isSuccessful">
      <p>Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
</div>
