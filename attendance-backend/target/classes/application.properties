spring.application.name=attendance-backend
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3308/attendance_system
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=your_secret_key_which_must_be_at_least_256_bits_long_to_be_secure_enough_for_hmac_sha256
jwt.expiration=86400000
